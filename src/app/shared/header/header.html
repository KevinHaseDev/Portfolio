<div class="wrapper">
    <header class="content-shell">

        <button class="menu_toggle" type="button" aria-controls="primary-navigation" [attr.aria-expanded]="isMenuOpen"
            [attr.aria-label]="getMenuToggleAriaLabel()" (click)="toggleMenu()">
            <span class="menu_icon" [class.open]="isMenuOpen" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <nav id="primary-navigation" class="links" [class.open]="isMenuOpen" [attr.aria-label]="getNavigationAriaLabel()"
            [attr.aria-hidden]="getAriaHiddenValue()">
            <label class="switch">
                <input type="checkbox" [checked]="isGermanLanguageActive()" [attr.aria-label]="getLanguageSwitchAriaLabel()"
                    (change)="onLanguageSwitchChange($event)">
                <span class="slider" aria-hidden="true">
                    <span class="language_label language_label_en">EN</span>
                    <span class="language_label language_label_de">DE</span>
                </span>
            </label>

            @for (section of sections; track section.id) {
            <button class="nav_link" type="button" (click)="navigateToSection(section.id)"
                [class.active]="activeSectionId === section.id"
                [attr.aria-current]="activeSectionId === section.id ? 'location' : null">
                {{ getSectionLabel(section) }}
            </button>
            }
        </nav>
        <button class="logo_button" type="button" (click)="navigateToSection('home')"
            [attr.aria-label]="getHomeButtonAriaLabel()">
            <span class="logo_stack">
                <img class="logo_image logo_image_default" src="./assets/img/Monogramm.png" [attr.alt]="getLogoAltText()">
                <img class="logo_image logo_image_hover" src="./assets/img/Monogramm_hover.png" alt="" aria-hidden="true">
            </span>
        </button>
    </header>
</div>
