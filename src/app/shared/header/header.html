<div class="wrapper">
    <header class="content-shell">

        <button class="menu_toggle" type="button" aria-controls="primary-navigation" [attr.aria-expanded]="isMenuOpen"
            [attr.aria-label]="isMenuOpen ? 'Close menu' : 'Open menu'" (click)="toggleMenu()">
            <span class="menu_text">Menu</span>
            <span class="menu_icon" [class.open]="isMenuOpen" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <nav id="primary-navigation" class="links" [class.open]="isMenuOpen" aria-label="Primary navigation"
            [attr.aria-hidden]="getAriaHiddenValue()">
            <label class="switch">
                <input type="checkbox" aria-label="Change language">
                <span class="slider round"></span>
            </label>

            @for (section of sections; track section.id) {
            <button class="nav_link" type="button" (click)="navigateToSection(section.id)"
                [class.active]="activeSectionId === section.id"
                [attr.aria-current]="activeSectionId === section.id ? 'location' : null">
                {{ section.label }}
            </button>
            }
        </nav>
        <button class="logo_button" type="button" (click)="navigateToSection('home')"
            aria-label="Navigate to home section">
            <img src="./assets/img/Monogramm3.png" alt="Portfolio logo">
        </button>
    </header>
</div>
