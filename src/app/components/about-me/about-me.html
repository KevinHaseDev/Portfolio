<div class="wrapper">
    <section id="about" class="content-shell section-space">
    <div class="left_part">
        <div class="image-stack">
            <img class="imageAboutMe" src="./assets/img/test_img/test_img_one.jpg" alt="">
            <img class="imageAboutMe_background" src="./assets/img/About me/Capa_1.svg" alt="">
        </div>
    </div>
    <div class="right_part">
        <span>{{ content().subtitle }}</span>
        <div class="aboutMe">
            <h2>{{ content().title }}</h2>
            <p class="p_static">{{ content().introduction }}</p>
            <div class="text">
                <div>
                    <img class="icons" src="./assets/icons/about_me/location_on.svg" alt="">
                    <p class="p_hover">{{ content().locationText }}</p>
                </div>
                <div>
                    <img class="icons" src="./assets/icons/about_me/cognition.svg" alt="">
                    <p class="p_hover">{{ content().mindsetText }}</p>
                </div>
                <div>
                    <img class="icons" src="./assets/icons/about_me/new_releases.svg" alt="">
                    <p class="p_hover">{{ content().problemSolvingText }}</p>
                </div>
            </div>
        </div>

    </div>
    </section>
</div>
